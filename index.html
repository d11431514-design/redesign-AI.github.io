<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能展示導覽網頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .nav-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="glass-card p-10 max-w-lg w-full text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">專案工作坊</h1>
        <p class="text-gray-500 mb-10">請選擇欲瀏覽的功能模組</p>
        
        <div class="space-y-6">
            <a href="1.html" class="nav-button block w-full py-4 bg-white text-blue-600 font-semibold rounded-xl border border-blue-100 flex items-center justify-center space-x-3">
                <span class="text-xl">🧩</span>
                <span>3x3 數字推盤</span>
            </a>
            
            <a href="2.html" class="nav-button block w-full py-4 bg-white text-purple-600 font-semibold rounded-xl border border-purple-100 flex items-center justify-center space-x-3">
                <span class="text-xl">🎨</span>
                <span>數位影像工作坊</span>
            </a>
            
            <a href="3.html" class="nav-button block w-full py-4 bg-white text-emerald-600 font-semibold rounded-xl border border-emerald-100 flex items-center justify-center space-x-3">
                <span class="text-xl">🚲</span>
                <span>YouBike 資料儀表板</span>
            </a>
        </div>
        
        <footer class="mt-12 text-sm text-gray-400">
            © 2024 精簡網頁設計範例
        </footer>
    </div>

</body>
</html>
